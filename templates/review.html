{% extends "base.html" %}
{% block title %}Review: {{ result.test_name or result.test_id }} — {{ site.name }}{% endblock %}

{% block body %}
<div id="app" class="test-page">
    <div id="review-loading" class="screen screen--active">
        <div class="loading-msg">Loading review…</div>
    </div>

    <div id="review-main" class="screen">
        <header class="test-header" role="banner">
            <div class="test-header__left">
                <a href="{% if user.role in ('admin','teacher') %}/teacher/results{% elif user.role == 'parent' %}/parent{% else %}/history{% endif %}" class="btn btn--icon" title="Back" aria-label="Back">
                    <svg width="20" height="20" viewBox="0 0 20 20"><path d="M13 4L7 10l6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                </a>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode" id="theme-toggle-test">
                    <svg width="20" height="20" viewBox="0 0 20 20" id="theme-icon-test"></svg>
                </button>
            </div>
            <div class="test-header__center">
                <div class="test-header__section" id="rv-section-label">Review</div>
            </div>
            <div class="test-header__right">
                <select id="rv-module-select" class="login-input" style="font-size:0.82rem;height:36px;min-height:36px;max-width:240px;padding:0 28px 0 10px" onchange="jumpToModuleSelect()" aria-label="Jump to module"></select>
            </div>
        </header>

        <!-- Section summary bar -->
        <div id="rv-summary" class="review-summary"></div>

        <div class="progress-dots-row" id="rv-progress-row">
            <div class="progress-dots" id="rv-dots" role="group" aria-label="Question progress"></div>
            <span class="progress-counter" id="rv-counter"></span>
        </div>

        <div class="test-body" id="rv-body" role="main"></div>

        <footer class="test-footer" role="navigation" aria-label="Question navigation">
            <button class="btn btn--secondary" id="rv-prev" onclick="rvPrev()" aria-label="Previous question">&larr; Previous</button>
            <div class="test-footer__spacer"></div>
            <button class="btn btn--primary" id="rv-next" onclick="rvNext()" aria-label="Next question">Next &rarr;</button>
        </footer>
    </div>
</div>

<script>
var RESULT_ID = {{ result.id }};
var USER_ROLE = {{ user.role|tojson }};
var USER_ID = {{ user.id }};
var BACK_URL = {% if user.role in ('admin','teacher') %}'/teacher/results'{% elif user.role == 'parent' %}'/parent'{% else %}'/history'{% endif %};
var _data = null;
var _allPages = [];
var _pageIdx = 0;
var _sectionBreaks = [];
var _isAuthTeacher = false; // Set from API response

// Rubric descriptors from official ETS TOEFL iBT scoring guides
var RUBRIC_DESCRIPTORS = {
    listen_repeat: {
        name: 'Listen & Repeat',
        scores: {
            5: 'The response exactly repeats the prompt. Fully intelligible.',
            4: 'Captures meaning but not an exact repetition. Minor word/grammar changes that don\'t substantially change meaning.',
            3: 'Essentially full but does not accurately capture original meaning. Multiple function words may be changed or missing.',
            2: 'Missing a significant part of the prompt and/or is highly inaccurate. Intelligibility is low.',
            1: 'Captures very little of the prompt or is largely unintelligible.',
            0: 'No response, entirely unintelligible, or entirely unconnected to the prompt.'
        }
    },
    interview: {
        name: 'Take an Interview',
        scores: {
            5: 'Fully successful. On topic, well elaborated. Good pace, easily intelligible pronunciation. Accurate grammar and vocabulary.',
            4: 'Generally successful. On topic and elaborated. Good pace with some pausing. Intelligibility not impeded. Adequate grammar/vocabulary.',
            3: 'Partially successful. Generally on topic but limited elaboration. Frequent pauses, choppy pace. Limited grammar and vocabulary range.',
            2: 'Mostly unsuccessful. Minimally connected to the question. Limited intelligibility. Very limited grammar and vocabulary.',
            1: 'Unsuccessful. Only vaguely connected. Mostly unintelligible. Isolated words or phrases.',
            0: 'No response, entirely unintelligible, or entirely unconnected to the prompt.'
        }
    },
    email: {
        name: 'Write an Email',
        scores: {
            5: 'Fully successful. Effective, clearly expressed. Effective syntactic variety, precise word choice. Consistent social conventions. Almost no errors.',
            4: 'Generally successful. Mostly effective and easily understood. Adequate elaboration, syntactic variety. Few errors.',
            3: 'Partially successful. Generally accomplishes the task. Elaboration partially supports purpose. Moderate syntax/vocabulary range. Some noticeable errors.',
            2: 'Mostly unsuccessful. Attempt to address task but mostly ineffective. Limited or irrelevant elaboration. Accumulation of errors.',
            1: 'Unsuccessful. Ineffective attempt. Very little elaboration. Telegraphic language. Serious and frequent errors.',
            0: 'Blank, rejects topic, not in English, or entirely copied from prompt.'
        }
    },
    discussion: {
        name: 'Write for Academic Discussion',
        scores: {
            5: 'Fully successful. Relevant and very clearly expressed contribution. Well-elaborated explanations/details. Effective syntax, precise word choice.',
            4: 'Generally successful. Relevant contribution, easily understood. Adequately elaborated. Variety of syntactic structures. Few errors.',
            3: 'Partially successful. Mostly relevant and understandable. Part of elaboration may be missing/unclear. Some variety in syntax. Noticeable errors.',
            2: 'Mostly unsuccessful. Attempt to contribute but ideas may be hard to follow. Limited syntactic range. Accumulation of errors.',
            1: 'Unsuccessful. Ineffective attempt. Few/no coherent ideas. Severely limited range. Serious frequent errors.',
            0: 'Blank, rejects topic, not in English, or entirely copied from prompt.'
        }
    }
};

function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

async function loadReview() {
    try {
        var resp = await fetch('/api/review-data/' + RESULT_ID);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        _data = await resp.json();
    } catch (e) {
        document.getElementById('review-loading').innerHTML = '<div class="loading-msg">Failed to load review data.</div>';
        return;
    }
    _isAuthTeacher = _data.is_authorized_teacher || false;
    _allPages = [];
    _sectionBreaks = [];
    var lastSection = '';
    _data.modules.forEach(function(mod, mi) {
        (mod.pages || []).forEach(function(pg, pi) {
            var key = mod.section + '_' + mod.module;
            if (key !== lastSection) {
                _sectionBreaks.push(_allPages.length);
                lastSection = key;
            }
            _allPages.push({ page: pg, moduleIdx: mi, section: mod.section, module: mod.module });
        });
    });
    if (!_allPages.length) {
        document.getElementById('review-loading').innerHTML = '<div class="loading-msg">No questions found for this result.</div>';
        return;
    }
    document.getElementById('review-loading').classList.remove('screen--active');
    document.getElementById('review-main').classList.add('screen--active');
    buildModuleDropdown();
    buildSummary();
    buildDots();
    // Load TOEFL band scores
    loadBandScores();
    renderPage();
}

function buildModuleDropdown() {
    var sel = document.getElementById('rv-module-select');
    sel.innerHTML = '';
    _data.modules.forEach(function(mod, mi) {
        var opt = document.createElement('option');
        opt.value = mi;
        var label = mod.section.charAt(0).toUpperCase() + mod.section.slice(1) + ' M' + mod.module;
        opt.textContent = label;
        sel.appendChild(opt);
    });
}

var _bandScores = {};
async function loadBandScores() {
    try {
        var resp = await fetch('/api/toefl-scores/' + RESULT_ID);
        var data = await resp.json();
        _bandScores = data;
        // Update dropdown labels with band scores
        var sel = document.getElementById('rv-module-select');
        _data.modules.forEach(function(mod, mi) {
            var band = (data.section_bands || {})[mod.section];
            if (band !== undefined && band !== null) {
                var label = mod.section.charAt(0).toUpperCase() + mod.section.slice(1) + ' M' + mod.module + ' — ' + band.toFixed(1);
                sel.options[mi].textContent = label;
            }
        });
        // Update summary with band scores
        buildSummary();
    } catch (e) {}
}

function jumpToModuleSelect() {
    var mi = parseInt(document.getElementById('rv-module-select').value);
    // Find first page of this module
    for (var i = 0; i < _allPages.length; i++) {
        if (_allPages[i].moduleIdx === mi) {
            _pageIdx = i; renderPage(); return;
        }
    }
}

function buildSummary() {
    var el = document.getElementById('rv-summary');
    var sums = _data.section_summaries || [];
    if (!sums.length) { el.style.display = 'none'; return; }
    var html = '';
    sums.forEach(function(s) {
        var label = s.section.charAt(0).toUpperCase() + s.section.slice(1);
        if (sums.length > 1) label += ' M' + s.moduleNum;
        var band = (_bandScores.section_bands || {})[s.section];
        html += '<div class="review-summary__item" data-section="' + s.section + '" data-module="' + s.moduleNum + '" onclick="jumpToSection(\'' + s.section + '\',' + s.moduleNum + ')" style="cursor:pointer">';
        html += '<span class="review-summary__label" style="color:var(--' + s.section + ')">' + label + '</span>';
        if (band !== undefined && band !== null) {
            html += '<span class="review-summary__score" style="font-weight:700;color:var(--accent)">' + band.toFixed(1) + '</span>';
        } else if (s.total > 0) {
            html += '<span class="review-summary__score">' + s.correct + '/' + s.total + '</span>';
        }
        html += '</div>';
    });
    // Overall band
    if (_bandScores.overall !== undefined && _bandScores.overall !== null) {
        html += '<div class="review-summary__item" style="background:var(--accent-dim);border:1px solid var(--accent)">';
        html += '<span class="review-summary__label" style="color:var(--accent);font-weight:700">Overall</span>';
        html += '<span class="review-summary__score" style="font-weight:700;color:var(--accent);font-size:1rem">' + _bandScores.overall.toFixed(1) + '</span>';
        html += '</div>';
    }
    // Show overall teacher comment if present
    var overall = _data.comments && _data.comments._overall;
    if (overall && overall.comment) {
        html += '<div class="review-summary__comment"><strong>Teacher:</strong> ' + esc(overall.comment) + '</div>';
    }
    el.innerHTML = html;
}

function jumpToSection(section, moduleNum) {
    for (var i = 0; i < _allPages.length; i++) {
        if (_allPages[i].section === section && _allPages[i].module === moduleNum) {
            _pageIdx = i; renderPage(); return;
        }
    }
}

function buildDots() {
    var container = document.getElementById('rv-dots');
    container.innerHTML = '';
    _allPages.forEach(function(item, i) {
        // Add section separator
        if (_sectionBreaks.indexOf(i) !== -1 && i > 0) {
            var sep = document.createElement('span');
            sep.className = 'progress-dot-separator';
            container.appendChild(sep);
        }
        var dot = document.createElement('span');
        dot.className = 'progress-dot';
        var g = item.page.graded || {};
        var pg = item.page;
        if (pg.question_type === 'cloze') {
            // Cloze: check all sub-questions — red if ANY wrong, green only if ALL correct
            var clozeDetails = pg.cloze_details || [];
            var allCorrect = clozeDetails.length > 0;
            var anyWrong = false;
            clozeDetails.forEach(function(d) {
                if (d.correct === false) anyWrong = true;
                if (d.correct !== true) allCorrect = false;
            });
            if (anyWrong) dot.classList.add('progress-dot--wrong');
            else if (allCorrect) dot.classList.add('progress-dot--correct');
            else dot.classList.add('progress-dot--answered');
        } else if (g.correct === true) {
            dot.classList.add('progress-dot--correct');
        } else if (g.correct === false) {
            dot.classList.add('progress-dot--wrong');
        } else {
            dot.classList.add('progress-dot--answered');
        }
        dot.setAttribute('data-idx', i);
        dot.onclick = function() { _pageIdx = i; renderPage(); };
        dot.style.cursor = 'pointer';
        container.appendChild(dot);
    });
}

function updateDots() {
    var dots = document.querySelectorAll('#rv-dots .progress-dot');
    dots.forEach(function(dot) {
        var idx = parseInt(dot.getAttribute('data-idx'));
        dot.classList.toggle('progress-dot--current', idx === _pageIdx);
    });
    document.getElementById('rv-counter').textContent = (_pageIdx + 1) + ' / ' + _allPages.length;
}

function renderPage() {
    var item = _allPages[_pageIdx];
    var pg = item.page;
    var g = pg.graded || {};
    var qid = pg.question_id || '';
    var body = document.getElementById('rv-body');
    body.innerHTML = '';
    body.classList.remove('test-body--splitpane');
    body.scrollTop = 0;
    window.scrollTo(0, 0);

    // Update header section label
    document.getElementById('rv-section-label').textContent =
        item.section.charAt(0).toUpperCase() + item.section.slice(1) + ' — Module ' + item.module;
    // Update dropdown selection
    document.getElementById('rv-module-select').value = item.moduleIdx;

    // Group title
    if (pg.group_title) body.appendChild(mkEl('div', 'group-label', pg.group_title));

    // Question
    if (pg.question_type === 'mc') renderMCReview(body, pg, g);
    else if (pg.question_type === 'cloze') renderClozeReview(body, pg);
    else if (pg.question_type === 'build_sentence') renderBuildReview(body, pg, g);
    else if (pg.question_type === 'email' || pg.question_type === 'discussion') renderWriteReview(body, pg, g);
    else if (pg.question_type === 'listen_repeat' || pg.question_type === 'interview') renderSpeakReview(body, pg, g);

    // Score indicator — BELOW the question content
    var scoreHtml = '';
    if (g.correct === true) scoreHtml = '<span style="color:var(--green)">✓ Correct</span>';
    else if (g.correct === false) scoreHtml = '<span style="color:var(--red)">✗ Wrong</span>';
    else if (g.type === 'email' || g.type === 'discussion') scoreHtml = '<span style="color:var(--text-muted)">' + (g.wordCount || 0) + ' words</span>';
    else if (g.type === 'listen_repeat' || g.type === 'interview') scoreHtml = '<span style="color:var(--text-muted)">' + (g.hasRecording ? 'Recorded' : 'No recording') + '</span>';
    if (g.time) scoreHtml += ' <span style="color:var(--text-dim);margin-left:8px">' + g.time + 's</span>';
    if (scoreHtml) {
        var scoreBar = mkEl('div', '', '');
        scoreBar.style.cssText = 'padding:10px 16px;margin-top:12px;border-radius:var(--radius-sm);background:var(--bg-input);font-size:0.9rem;font-weight:600';
        scoreBar.innerHTML = scoreHtml;
        body.appendChild(scoreBar);
    }

    // Rubric grading UI for speaking/writing (teachers only)
    var isRubricType = (pg.question_type === 'email' || pg.question_type === 'discussion' ||
                        pg.question_type === 'listen_repeat' || pg.question_type === 'interview');
    if (isRubricType) {
        renderRubricGrading(body, pg, qid);
    }

    // Explanation
    var expl = _data.explanations[qid];
    if (expl) {
        var box = mkEl('div', 'review-panel review-panel--explanation');
        box.innerHTML = '<strong>Explanation</strong><div style="margin-top:6px">' + expl + '</div>';
        body.appendChild(box);
    }

    // Per-question teacher comment (visible to all if submitted)
    var cmt = _data.comments[qid];
    if (cmt && cmt.comment && !cmt.comment.match(/^\d$/) /* skip rubric-only entries */) {
        var box = mkEl('div', 'review-panel review-panel--comment');
        box.innerHTML = '<strong>Teacher</strong><div style="margin-top:6px">' + esc(cmt.comment) + '</div><div style="font-size:0.82rem;color:var(--text-dim);margin-top:4px">— ' + esc(cmt.teacher || '') + '</div>';
        body.appendChild(box);
    }

    // Notes section — students write student notes, authorized teachers write teacher comments
    if (USER_ROLE === 'student') {
        var noteVal = _data.notes[qid] || '';
        var noteBox = mkEl('div', 'review-panel review-panel--note');
        noteBox.innerHTML = '<strong>My Notes</strong>';
        var ta = document.createElement('textarea');
        ta.className = 'note-area'; ta.placeholder = 'Add a note…'; ta.rows = 3; ta.value = noteVal;
        (function(capturedQid) {
            ta.onblur = function() {
                fetch('/api/notes/' + RESULT_ID, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({question_id: capturedQid, note: ta.value.trim()})
                });
                _data.notes[capturedQid] = ta.value.trim();
            };
        })(qid);
        noteBox.appendChild(ta);
        body.appendChild(noteBox);
    } else if (_isAuthTeacher || USER_ROLE === 'admin') {
        var tcBox = mkEl('div', 'review-panel review-panel--note');
        tcBox.innerHTML = '<strong style="color:var(--listening)">Teacher Comment</strong>';
        var tca = document.createElement('textarea');
        tca.className = 'note-area'; tca.style.borderColor = 'var(--listening)';
        tca.placeholder = 'Teacher comment…'; tca.rows = 2;
        var existingCmt = _data.comments[qid];
        tca.value = existingCmt ? existingCmt.comment || '' : '';
        (function(capturedQid) {
            tca.onblur = function() {
                fetch('/api/comments/' + RESULT_ID, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({question_id: capturedQid, comment: tca.value.trim()})
                });
                if (!_data.comments[capturedQid]) _data.comments[capturedQid] = {};
                _data.comments[capturedQid].comment = tca.value.trim();
            };
        })(qid);
        tcBox.appendChild(tca);
        body.appendChild(tcBox);
    }

    // Nav
    document.getElementById('rv-prev').style.display = _pageIdx > 0 ? '' : 'none';
    document.getElementById('rv-next').textContent = _pageIdx < _allPages.length - 1 ? 'Next →' : 'Done';
    updateDots();
}

/* ======= RUBRIC GRADING ======= */
function renderRubricGrading(body, pg, qid) {
    var rubricKey = '_rubric_' + qid;
    var existingScore = _data.comments[rubricKey];
    var currentScore = existingScore ? parseInt(existingScore.comment) : -1;
    var isSubmitted = existingScore ? existingScore.submitted === 1 : false;
    var rubricType = pg.question_type; // 'email', 'discussion', 'listen_repeat', 'interview'
    var descriptors = RUBRIC_DESCRIPTORS[rubricType];
    if (!descriptors) return;

    // For students: only show score if submitted
    if (USER_ROLE === 'student' || USER_ROLE === 'parent') {
        if (isSubmitted && currentScore >= 0) {
            var scoreBox = mkEl('div', 'review-panel');
            scoreBox.style.cssText = 'background:var(--accent-dim);border:1px solid var(--accent);margin-top:12px';
            scoreBox.innerHTML = '<strong style="color:var(--accent)">Rubric Score: ' + currentScore + '/5</strong>' +
                '<div style="margin-top:4px;font-size:0.88rem;color:var(--text-muted)">' + esc(descriptors.scores[currentScore] || '') + '</div>';
            body.appendChild(scoreBox);
        }
        return;
    }

    // For unauthorized teachers: show score read-only if submitted
    if (USER_ROLE === 'teacher' && !_isAuthTeacher) {
        if (isSubmitted && currentScore >= 0) {
            var scoreBox = mkEl('div', 'review-panel');
            scoreBox.style.cssText = 'background:var(--bg-input);border:1px solid var(--border);margin-top:12px';
            scoreBox.innerHTML = '<strong>Rubric Score: ' + currentScore + '/5</strong>' +
                '<div style="margin-top:4px;font-size:0.88rem;color:var(--text-muted)">' + esc(descriptors.scores[currentScore] || '') + '</div>';
            body.appendChild(scoreBox);
        }
        return;
    }

    // Authorized teacher / admin: full grading UI
    var container = mkEl('div', 'rubric-grading');
    container.style.cssText = 'margin-top:16px;padding:16px;border-radius:var(--radius);border:1.5px solid var(--listening);background:rgba(175,82,222,0.04)';
    var header = mkEl('div', '', '<strong style="color:var(--listening)">' + esc(descriptors.name) + ' — Rubric Scoring</strong>');
    header.style.marginBottom = '12px';
    container.appendChild(header);

    // Score buttons 0-5
    var btnRow = mkEl('div', '', '');
    btnRow.style.cssText = 'display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap';
    for (var s = 5; s >= 0; s--) {
        var btn = document.createElement('button');
        btn.className = 'btn ' + (s === currentScore ? 'btn--primary' : 'btn--secondary');
        btn.style.cssText = 'min-width:44px;height:44px;font-size:1rem;font-weight:700';
        if (s === currentScore) btn.style.background = 'var(--listening)';
        btn.textContent = s;
        btn.setAttribute('data-score', s);
        btn.onclick = (function(score, qid_) {
            return function() {
                // Auto-save on click (draft)
                fetch('/api/rubric-score/' + RESULT_ID, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({question_id: qid_, score: score})
                });
                // Update local state
                if (!_data.comments['_rubric_' + qid_]) _data.comments['_rubric_' + qid_] = {};
                _data.comments['_rubric_' + qid_].comment = String(score);
                _data.comments['_rubric_' + qid_].submitted = 0;
                // Re-render
                renderPage();
            };
        })(s, qid);
        btnRow.appendChild(btn);
    }
    container.appendChild(btnRow);

    // Show descriptor for current or hovered score
    var descEl = mkEl('div', '', '');
    descEl.style.cssText = 'font-size:0.85rem;color:var(--text-muted);line-height:1.5;min-height:40px';
    if (currentScore >= 0) {
        descEl.innerHTML = '<strong style="color:var(--text)">' + currentScore + '/5:</strong> ' + esc(descriptors.scores[currentScore] || '');
    } else {
        descEl.textContent = 'Click a score above to grade this response.';
    }
    container.appendChild(descEl);

    // Per-question status indicator
    if (currentScore >= 0) {
        var statusEl = mkEl('div', '', '');
        statusEl.style.cssText = 'font-size:0.82rem;margin-top:6px';
        if (isSubmitted) {
            statusEl.innerHTML = '<span style="color:var(--green)">✓ Published</span>';
        } else {
            statusEl.innerHTML = '<span style="color:var(--amber)">Draft — not yet visible to student</span>';
        }
        container.appendChild(statusEl);
    }

    // Submit button removed from per-question — now handled by module-level "Publish Scores" button below

    body.appendChild(container);

    // Module-level "Publish Scores" button: appears if ANY draft rubric scores exist in this module
    renderModulePublishButton(body);
}

function renderModulePublishButton(body) {
    // Remove any existing publish bar
    var existing = document.getElementById('module-publish-bar');
    if (existing) existing.remove();

    if (USER_ROLE === 'student' || USER_ROLE === 'parent') return;
    if (!_isAuthTeacher && USER_ROLE !== 'admin') return;

    // Count draft + total rubric questions in the current module
    var item = _allPages[_pageIdx];
    var currentSection = item.section;
    var currentModule = item.module;
    var draftCount = 0, totalRubricQs = 0, submittedCount = 0;
    _allPages.forEach(function(p) {
        if (p.section !== currentSection || p.module !== currentModule) return;
        var qt = p.page.question_type;
        if (qt === 'email' || qt === 'discussion' || qt === 'listen_repeat' || qt === 'interview') {
            totalRubricQs++;
            var rubricKey = '_rubric_' + p.page.question_id;
            var entry = _data.comments[rubricKey];
            if (entry && entry.comment !== undefined) {
                if (entry.submitted === 0) draftCount++;
                else if (entry.submitted === 1) submittedCount++;
            }
        }
    });

    if (totalRubricQs === 0) return;

    var bar = mkEl('div', '', '');
    bar.id = 'module-publish-bar';
    bar.style.cssText = 'margin-top:16px;padding:14px 16px;border-radius:var(--radius);background:var(--bg-input);border:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-wrap:wrap';

    var moduleLabel = currentSection.charAt(0).toUpperCase() + currentSection.slice(1) + ' M' + currentModule;

    if (draftCount > 0) {
        var status = mkEl('span', '', '');
        status.style.cssText = 'font-size:0.85rem;color:var(--text-muted);flex:1';
        status.textContent = draftCount + ' unpublished score(s) in ' + moduleLabel;
        bar.appendChild(status);
        var pubBtn = document.createElement('button');
        pubBtn.className = 'btn btn--primary';
        pubBtn.style.cssText = 'background:var(--listening);white-space:nowrap';
        pubBtn.textContent = 'Publish Scores';
        pubBtn.onclick = function() {
            pubBtn.disabled = true;
            pubBtn.textContent = 'Publishing...';
            fetch('/api/rubric-submit/' + RESULT_ID, {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({module_label: moduleLabel})
            }).then(function() {
                // Mark all draft scores for this module as submitted locally
                _allPages.forEach(function(p) {
                    if (p.section !== currentSection || p.module !== currentModule) return;
                    var rubricKey = '_rubric_' + p.page.question_id;
                    if (_data.comments[rubricKey] && _data.comments[rubricKey].submitted === 0) {
                        _data.comments[rubricKey].submitted = 1;
                    }
                });
                loadBandScores();
                renderPage();
            });
        };
        bar.appendChild(pubBtn);
    } else if (submittedCount > 0) {
        var status = mkEl('span', '', '');
        status.style.cssText = 'font-size:0.85rem;color:var(--green);font-weight:600';
        status.textContent = '✓ All rubric scores published for ' + moduleLabel + ' (' + submittedCount + '/' + totalRubricQs + ')';
        bar.appendChild(status);
    } else {
        var status = mkEl('span', '', '');
        status.style.cssText = 'font-size:0.85rem;color:var(--text-dim)';
        status.textContent = '0/' + totalRubricQs + ' rubric questions scored in ' + moduleLabel;
        bar.appendChild(status);
    }
    body.appendChild(bar);
}

function rvNext() {
    if (_pageIdx < _allPages.length - 1) { _pageIdx++; renderPage(); }
    else { window.location.href = BACK_URL; }
}
function rvPrev() { if (_pageIdx > 0) { _pageIdx--; renderPage(); } }

document.addEventListener('keydown', function(e) {
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
    if (e.key === 'ArrowRight' || e.key === 'Enter') { e.preventDefault(); rvNext(); }
    else if (e.key === 'ArrowLeft') { e.preventDefault(); rvPrev(); }
});

function mkEl(tag, cls, html) {
    var e = document.createElement(tag); if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e;
}

/* ======= RENDERERS ======= */

function renderMCReview(body, pg, g) {
    var hasPassage = !!pg.passage_html;
    if (hasPassage) {
        body.classList.add('test-body--splitpane');
        var pane = mkEl('div', 'split-pane');
        var left = mkEl('div', 'split-pane__left');
        left.appendChild(mkEl('div', 'passage-panel passage-panel--full', pg.passage_html));
        if (pg.audio) left.appendChild(mkAudioPlayer(pg.audio));
        pane.appendChild(left);
        var right = mkEl('div', 'split-pane__right');
        if (pg.group_title) right.appendChild(mkEl('div', 'group-label', pg.group_title));
        if (pg.prompt_html) right.appendChild(mkEl('div', 'question-prompt', pg.prompt_html));
        right.appendChild(buildReviewChoices(pg, g));
        pane.appendChild(right);
        var existing = body.querySelector('.group-label');
        if (existing) existing.remove();
        body.appendChild(pane);
    } else {
        if (pg.audio) body.appendChild(mkAudioPlayer(pg.audio));
        if (pg.prompt_html) body.appendChild(mkEl('div', 'question-prompt', pg.prompt_html));
        body.appendChild(buildReviewChoices(pg, g));
    }
}

function buildReviewChoices(pg, g) {
    var userAns = g.user || '';
    var correctAns = g.expected || pg.answer || '';
    var div = mkEl('div', 'choices');
    for (var letter in (pg.choices || {})) {
        var text = pg.choices[letter];
        var label = mkEl('label', 'choice');
        label.style.pointerEvents = 'none';
        if (letter === correctAns) label.classList.add('choice--correct');
        if (letter === userAns && userAns !== correctAns) label.classList.add('choice--wrong');
        if (letter === userAns) label.classList.add('choice--selected');
        var radio = document.createElement('input');
        radio.type = 'radio'; radio.disabled = true;
        if (letter === userAns) radio.checked = true;
        label.appendChild(radio);
        label.appendChild(mkEl('span', 'choice__text', esc(text)));
        div.appendChild(label);
    }
    return div;
}

function renderClozeReview(body, pg) {
    if (pg.passage_html) {
        var html = pg.passage_html;
        var fills = pg.cloze_fills || [];
        var words = pg.cloze_answers || [];
        var cdet = pg.cloze_details || [];
        var idx = 0;
        html = html.replace(/(\w*)\[(\d+)\](\w*)/g, function(match, prefix, countStr, suffix) {
            var d = cdet[idx] || {};
            var userWord = d.user || '\u2014';
            var correctWord = words[idx] || fills[idx] || '';
            var isCorrect = d.correct;
            var cls = isCorrect ? 'review-cloze-inline--correct' : 'review-cloze-inline--wrong';
            var display = isCorrect ? esc(correctWord) : '<s>' + esc(userWord) + '</s> ' + esc(correctWord);
            idx++;
            return '<span class="review-cloze-inline ' + cls + '">' + display + '</span>';
        });
        body.appendChild(mkEl('div', 'passage-panel', html));
    }
    var clozeDetails = pg.cloze_details || [];
    if (clozeDetails.length) {
        var table = mkEl('div', 'review-cloze-table');
        clozeDetails.forEach(function(d, i) {
            var row = mkEl('div', 'review-cloze-row ' + (d.correct ? 'review-cloze-row--correct' : 'review-cloze-row--wrong'));
            row.innerHTML = '<span class="review-cloze-row__num">' + (i+1) + '</span>' +
                '<span class="review-cloze-row__user">' + esc(d.user || '\u2014') + '</span>' +
                '<span class="review-cloze-row__arrow">\u2192</span>' +
                '<span class="review-cloze-row__answer">' + esc(d.fullWord || d.expected || '') + '</span>' +
                '<span class="review-cloze-row__icon">' + (d.correct ? '\u2713' : '\u2717') + '</span>';
            table.appendChild(row);
        });
        body.appendChild(table);
    }
}

function renderBuildReview(body, pg, g) {
    var hasContext = pg.details && (pg.details.context_html || pg.details.context);
    var userAns = g.user || '\u2014';
    var expected = g.expected || pg.answer || '';
    var compareHtml =
        '<div class="review-compare__row"><span class="review-compare__label">Your answer</span><span class="review-compare__value ' + (g.correct ? 'review-compare__value--correct' : 'review-compare__value--wrong') + '">' + esc(userAns) + '</span></div>' +
        '<div class="review-compare__row"><span class="review-compare__label">Correct</span><span class="review-compare__value review-compare__value--expected">' + esc(expected) + '</span></div>';
    if (hasContext) {
        body.classList.add('test-body--splitpane');
        var pane = mkEl('div', 'split-pane');
        var left = mkEl('div', 'split-pane__left');
        var ctx = mkEl('div', 'passage-panel passage-panel--full');
        ctx.innerHTML = pg.details.context_html || ('<strong>Context:</strong> ' + esc(pg.details.context));
        left.appendChild(ctx);
        pane.appendChild(left);
        var right = mkEl('div', 'split-pane__right');
        if (pg.group_title) right.appendChild(mkEl('div', 'group-label', pg.group_title));
        right.appendChild(mkEl('div', 'review-compare', compareHtml));
        pane.appendChild(right);
        var existing = body.querySelector('.group-label');
        if (existing) existing.remove();
        body.appendChild(pane);
    } else {
        body.appendChild(mkEl('div', 'review-compare', compareHtml));
    }
}

function renderWriteReview(body, pg, g) {
    var hasContent = !!pg.content_html;
    var text = g.user || '';
    var wordCount = text.trim() ? text.trim().split(/\s+/).length : 0;
    if (hasContent) {
        body.classList.add('test-body--splitpane');
        var pane = mkEl('div', 'split-pane');
        var left = mkEl('div', 'split-pane__left');
        left.appendChild(mkEl('div', 'passage-panel passage-panel--full', pg.content_html));
        pane.appendChild(left);
        var right = mkEl('div', 'split-pane__right');
        if (pg.group_title) right.appendChild(mkEl('div', 'group-label', pg.group_title));
        if (text) {
            right.appendChild(mkEl('div', 'writing-response', '<div class="writing-response__text">' + esc(text).replace(/\n/g, '<br>') + '</div>'));
            right.appendChild(mkEl('div', 'word-count', wordCount + ' words'));
        } else {
            right.appendChild(mkEl('div', 'review-panel review-panel--empty', '<em>No response submitted</em>'));
        }
        pane.appendChild(right);
        var existing = body.querySelector('.group-label');
        if (existing) existing.remove();
        body.appendChild(pane);
    } else {
        if (text) {
            body.appendChild(mkEl('div', 'writing-response', '<div class="writing-response__text">' + esc(text).replace(/\n/g, '<br>') + '</div>'));
            body.appendChild(mkEl('div', 'word-count', wordCount + ' words'));
        } else {
            body.appendChild(mkEl('div', 'review-panel review-panel--empty', '<em>No response submitted</em>'));
        }
    }
}

function renderSpeakReview(body, pg, g) {
    var hasContent = !!(pg.content_html || pg.content);
    var qid = pg.question_id || '';
    function buildRecArea(container) {
        if (pg.audio) container.appendChild(mkAudioPlayer(pg.audio));
        if (_data.recordings.indexOf(qid) !== -1) {
            container.appendChild(mkEl('div', '', '<strong style="display:block;margin:12px 0 6px;font-size:0.88rem;color:var(--text-muted)">Your Recording</strong>'));
            var audio = document.createElement('audio');
            audio.controls = true; audio.preload = 'none'; audio.className = 'recording-player';
            audio.innerHTML = '<source src="/recordings/' + RESULT_ID + '/' + encodeURIComponent(qid) + '">';
            container.appendChild(audio);
        } else if (g.hasRecording) {
            container.appendChild(mkEl('div', 'review-panel review-panel--empty', '<em>Recording not available on server</em>'));
        } else {
            container.appendChild(mkEl('div', 'review-panel review-panel--empty', '<em>No recording</em>'));
        }
    }
    if (hasContent) {
        body.classList.add('test-body--splitpane');
        var pane = mkEl('div', 'split-pane');
        var left = mkEl('div', 'split-pane__left');
        var prompt = mkEl('div', 'passage-panel passage-panel--full');
        prompt.innerHTML = pg.content_html || esc(pg.content);
        left.appendChild(prompt);
        pane.appendChild(left);
        var right = mkEl('div', 'split-pane__right');
        if (pg.group_title) right.appendChild(mkEl('div', 'group-label', pg.group_title));
        buildRecArea(right);
        pane.appendChild(right);
        var existing = body.querySelector('.group-label');
        if (existing) existing.remove();
        body.appendChild(pane);
    } else {
        buildRecArea(body);
    }
}

function mkAudioPlayer(src) {
    var audio = document.createElement('audio');
    audio.controls = true; audio.preload = 'auto'; audio.className = 'recording-player';
    audio.style.marginBottom = '16px';
    audio.innerHTML = '<source src="/audio/' + esc(src) + '">';
    return audio;
}

document.addEventListener('DOMContentLoaded', loadReview);
</script>
{% endblock %}
