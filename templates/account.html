{% extends "base.html" %}
{% block title %}Account — {{ site.name }}{% endblock %}

{% block body %}
<div class="layout">
    {% include "nav.html" %}
    <main class="layout__main" style="max-width:480px">
        <h2 class="page-heading" data-i18n="pageAccount">Account Settings</h2>

        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="flash-msg">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <div class="card">
            <h3 class="card__title" data-i18n="changePassword">Change Password</h3>
            <form method="POST" style="display:flex;flex-direction:column;gap:12px">
                <input type="hidden" name="_csrf" value="{{ csrf_token() }}">
                <input type="password" name="old_password" placeholder="Current password" data-i18n-placeholder="currentPassword" required class="login-input" autocomplete="current-password">
                <input type="password" name="new_password" placeholder="New password" data-i18n-placeholder="newPassword" required class="login-input" autocomplete="new-password">
                <input type="password" name="confirm_password" placeholder="Confirm new password" data-i18n-placeholder="confirmPassword" required class="login-input" autocomplete="new-password">
                <button type="submit" class="btn btn--primary" data-i18n="updatePassword">Update Password</button>
            </form>
        </div>
    </main>
</div>
{% endblock %}
