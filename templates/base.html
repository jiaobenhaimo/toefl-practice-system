    // Detect language
    (function() {
        const stored = localStorage.getItem('lang');
        if (stored) {
            window._lang = stored;
        } else {
            const nav = navigator.language || navigator.userLanguage || 'en';
            window._lang = nav.startsWith('zh') ? 'zh' : 'en';
        }
    })();
    function t(key) {
        return (I18N[window._lang] || I18N.en)[key] || (I18N.en[key]) || key;
    }
    function toggleLang() {
        window._lang = window._lang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('lang', window._lang);
        location.reload();
    }
    // Translate elements with data-i18n attribute on page load
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var key = el.getAttribute('data-i18n');
            var val = t(key);
            if (val && val !== key) el.textContent = val;
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
            var key = el.getAttribute('data-i18n-placeholder');
            var val = t(key);
            if (val && val !== key) el.placeholder = val;
        });
        document.querySelectorAll('[data-i18n-title]').forEach(function(el) {
            var key = el.getAttribute('data-i18n-title');
            var val = t(key);
            if (val && val !== key) el.title = val;
        });
        // Translate dates: elements with data-i18n-date="YYYY-MM-DD"
        if (window._lang === 'zh') {
            document.querySelectorAll('[data-i18n-date]').forEach(function(el) {
                var d = el.getAttribute('data-i18n-date');
                if (d && d.length >= 10) {
                    var y = d.slice(0,4), m = parseInt(d.slice(5,7)), day = parseInt(d.slice(8,10));
                    el.textContent = y + '年' + m + '月' + day + '日';
                }
            });
        }
        // Translate role badges
        document.querySelectorAll('[data-i18n-role]').forEach(function(el) {
            var role = el.getAttribute('data-i18n-role');
            el.textContent = tRole(role);
        });
        // Translate section chips
        document.querySelectorAll('[data-i18n-section]').forEach(function(el) {
            var sec = el.getAttribute('data-i18n-section');
            el.textContent = tSection(sec);
        });
    });
    // Helper: translate role name
    function tRole(role) {
        var map = {admin: t('roleAdmin'), teacher: t('roleTeacher'), student: t('roleStudent'), parent: t('roleParent')};
        return map[role] || role;
    }
    // Helper: translate section name
    function tSection(sec) {
        var cap = sec.charAt(0).toUpperCase() + sec.slice(1);
        var val = t(cap);
        return (val !== cap) ? val : cap;
    }
    // Helper: format date for current language
    function fmtDateI18n(dateStr) {
        if (!dateStr || dateStr.length < 10) return dateStr || '';
        var y = dateStr.slice(0,4), m = parseInt(dateStr.slice(5,7)), d = parseInt(dateStr.slice(8,10));
        if (window._lang === 'zh') return y + '年' + m + '月' + d + '日';
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[m-1] + ' ' + d + ', ' + y;
    }
    // Unified HIG confirmation dialog
    function showConfirm(title, message, confirmText, onConfirm) {
        var existing = document.getElementById('hig-confirm-overlay');
        if (existing) existing.remove();
        var overlay = document.createElement('div');
        overlay.id = 'hig-confirm-overlay';
        overlay.className = 'test-modal-overlay test-modal-overlay--active';
        overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
        var modal = document.createElement('div');
        modal.className = 'test-modal';
        modal.setAttribute('role', 'dialog');
        modal.style.maxWidth = '360px';
        var h3 = document.createElement('h3');
        h3.className = 'test-modal__title';
        h3.textContent = title;
        modal.appendChild(h3);
        var p = document.createElement('p');
        p.style.cssText = 'margin:16px 0;font-size:0.95rem;line-height:1.5;color:var(--text)';
        p.textContent = message;
        modal.appendChild(p);
        var btns = document.createElement('div');
        btns.style.cssText = 'display:flex;gap:10px;justify-content:flex-end';
        var cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn btn--secondary';
        cancelBtn.textContent = t('cancel');
        cancelBtn.onclick = function() { overlay.remove(); };
        var confirmBtn = document.createElement('button');
        confirmBtn.className = 'btn btn--primary';
        confirmBtn.style.background = 'var(--red)';
        confirmBtn.textContent = confirmText;
        confirmBtn.onclick = function() { overlay.remove(); onConfirm(); };
        btns.appendChild(cancelBtn);
        btns.appendChild(confirmBtn);
        modal.appendChild(btns);
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
        confirmBtn.focus();
    }

    <script>
    // Theme toggle (works on all pages)
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const isDark = current === 'dark' || (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const next = isDark ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeIcons();
    }
    function updateThemeIcons() {
        const html = document.documentElement;
        const theme = html.getAttribute('data-theme');
        const isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const sunSvg = '<circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M14.4 5.6l1.4-1.4M4.2 15.8l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>';
        const moonSvg = '<path d="M17 10.5A7.5 7.5 0 019.5 3 7 7 0 1017 10.5z" stroke="currentColor" stroke-width="1.5" fill="none"/>';
        document.querySelectorAll('[id^="theme-icon-"]').forEach(svg => {
            svg.innerHTML = isDark ? sunSvg : moonSvg;
        });
    }
    document.addEventListener('DOMContentLoaded', updateThemeIcons);

    // ===== Table sorting =====
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.user-table').forEach(function(table) {
            var headers = table.querySelectorAll('th');
            headers.forEach(function(th, colIdx) {
                // Skip empty header columns (actions)
                if (!th.textContent.trim()) return;
                // Add sort arrow
                var arrow = document.createElement('span');
                arrow.className = 'sort-arrow';
                arrow.textContent = ' ▲';
                th.appendChild(arrow);
                th.setAttribute('data-sort-dir', '');
                th.addEventListener('click', function() {
                    var dir = th.getAttribute('data-sort-dir') === 'asc' ? 'desc' : 'asc';
                    // Reset all arrows in this table
                    headers.forEach(function(h) {
                        h.setAttribute('data-sort-dir', '');
                        var a = h.querySelector('.sort-arrow');
                        if (a) { a.textContent = ' ▲'; a.className = 'sort-arrow'; }
                    });
                    th.setAttribute('data-sort-dir', dir);
                    arrow.textContent = dir === 'asc' ? ' ▲' : ' ▼';
                    arrow.className = 'sort-arrow sort-arrow--active';
                    // Sort rows
                    var tbody = table.querySelector('tbody');
                    if (!tbody) return;
                    var rows = Array.from(tbody.querySelectorAll('tr'));
                    rows.sort(function(a, b) {
                        var aText = (a.children[colIdx] ? a.children[colIdx].textContent : '').trim().toLowerCase();
                        var bText = (b.children[colIdx] ? b.children[colIdx].textContent : '').trim().toLowerCase();
                        // Try numeric sort first
                        var aNum = parseFloat(aText.replace(/[^0-9.\-]/g, ''));
                        var bNum = parseFloat(bText.replace(/[^0-9.\-]/g, ''));
                        if (!isNaN(aNum) && !isNaN(bNum)) {
                            return dir === 'asc' ? aNum - bNum : bNum - aNum;
                        }
                        // Try date sort (Mon DD, YYYY)
                        var aDate = Date.parse(aText);
                        var bDate = Date.parse(bText);
                        if (!isNaN(aDate) && !isNaN(bDate)) {
                            return dir === 'asc' ? aDate - bDate : bDate - aDate;
                        }
                        // Fallback: string sort
                        if (aText < bText) return dir === 'asc' ? -1 : 1;
                        if (aText > bText) return dir === 'asc' ? 1 : -1;
                        return 0;
                    });
                    rows.forEach(function(row) { tbody.appendChild(row); });
                });
            });
        });
    });
    </script>
