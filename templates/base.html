    <script>
    // Apply stored theme immediately to prevent flash
    (function() {
        const stored = localStorage.getItem('theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored) document.documentElement.setAttribute('data-theme', stored);
        else if (systemDark) document.documentElement.setAttribute('data-theme', 'dark');
        // Listen for system preference changes (auto-switch when no manual override)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
            if (!localStorage.getItem('theme')) {
                document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
                if (typeof updateThemeIcons === 'function') updateThemeIcons();
            }
        });
    })();
    </script>

    (function() {
        const stored = localStorage.getItem('lang');
        if (stored) window._lang = stored;
        else {
            const nav = navigator.language || navigator.userLanguage || 'en';
            window._lang = nav.startsWith('zh') ? 'zh' : 'en';
        }
    })();
    function t(key) {
        return (I18N[window._lang] || I18N.en)[key] || (I18N.en[key]) || key;
    }
    function toggleLang() {
        window._lang = window._lang === 'zh' ? 'en' : 'zh';
        localStorage.setItem('lang', window._lang);
        location.reload();
    }
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('[data-i18n]').forEach(function(el) {
            var key = el.getAttribute('data-i18n');
            var val = t(key);
            if (val && val !== key) el.textContent = val;
        });
        document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
            var key = el.getAttribute('data-i18n-placeholder');
            var val = t(key);
            if (val && val !== key) el.placeholder = val;
        });
        document.querySelectorAll('[data-i18n-title]').forEach(function(el) {
            var key = el.getAttribute('data-i18n-title');
            var val = t(key);
            if (val && val !== key) el.title = val;
        });
        if (window._lang === 'zh') {
            document.querySelectorAll('[data-i18n-date]').forEach(function(el) {
                var d = el.getAttribute('data-i18n-date');
                if (d && d.length >= 10) {
                    var y = d.slice(0,4), m = parseInt(d.slice(5,7)), day = parseInt(d.slice(8,10));
                    el.textContent = y + '年' + m + '月' + day + '日';
                }
            });
        }
        document.querySelectorAll('[data-i18n-role]').forEach(function(el) {
            var role = el.getAttribute('data-i18n-role');
            el.textContent = tRole(role);
        });
        document.querySelectorAll('[data-i18n-section]').forEach(function(el) {
            var sec = el.getAttribute('data-i18n-section');
            el.textContent = tSection(sec);
        });
    });
    function tRole(role) {
        var map = {admin: t('roleAdmin'), teacher: t('roleTeacher'), student: t('roleStudent'), parent: t('roleParent')};
        return map[role] || role;
    }
    function tSection(sec) {
        var cap = sec.charAt(0).toUpperCase() + sec.slice(1);
        var val = t(cap);
        return (val !== cap) ? val : cap;
    }
    function fmtDateI18n(dateStr) {
        if (!dateStr || dateStr.length < 10) return dateStr || '';
        var y = dateStr.slice(0,4), m = parseInt(dateStr.slice(5,7)), d = parseInt(dateStr.slice(8,10));
        if (window._lang === 'zh') return y + '年' + m + '月' + d + '日';
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        return months[m-1] + ' ' + d + ', ' + y;
    }

    // ===== Unified HIG confirmation dialog (with focus trap, Esc/Enter, destructive styling) =====
    // opts: { cancelText, destructive, onDismiss }  — onDismiss fires on cancel/backdrop/Esc
    function showConfirm(title, message, confirmText, onConfirm, opts) {
        opts = opts || {};
        var destructive = !!opts.destructive ||
            (opts.destructive === undefined && /delete|remove|discard|exit|清除|删除|移除|退出/i.test(confirmText || ''));
        var existing = document.getElementById('hig-confirm-overlay');
        if (existing) existing.remove();
        var overlay = document.createElement('div');
        overlay.id = 'hig-confirm-overlay';
        overlay.className = 'test-modal-overlay test-modal-overlay--active';
        overlay.setAttribute('role', 'presentation');
        var prevFocus = document.activeElement;
        var finished = false;
        function dismiss(confirmed) {
            if (finished) return;
            finished = true;
            overlay.remove();
            document.removeEventListener('keydown', keyHandler);
            if (prevFocus && prevFocus.focus) try { prevFocus.focus(); } catch(e) {}
            if (!confirmed && opts.onDismiss) try { opts.onDismiss(); } catch(e) { console.error(e); }
        }
        overlay.onclick = function(e) { if (e.target === overlay) dismiss(false); };
        var modal = document.createElement('div');
        modal.className = 'test-modal';
        modal.setAttribute('role', 'alertdialog');
        modal.setAttribute('aria-modal', 'true');
        modal.setAttribute('aria-labelledby', 'hig-confirm-title');
        modal.style.maxWidth = '360px';
        var h3 = document.createElement('h3');
        h3.className = 'test-modal__title';
        h3.id = 'hig-confirm-title';
        h3.textContent = title;
        modal.appendChild(h3);
        var p = document.createElement('p');
        p.style.cssText = 'margin:16px 0;font-size:0.95rem;line-height:1.5;color:var(--text-muted);white-space:pre-wrap';
        p.textContent = message;
        modal.appendChild(p);
        var btns = document.createElement('div');
        btns.style.cssText = 'display:flex;gap:10px;justify-content:flex-end';
        var cancelBtn = document.createElement('button');
        cancelBtn.type = 'button';
        cancelBtn.className = 'btn btn--secondary';
        cancelBtn.textContent = opts.cancelText || t('cancel');
        cancelBtn.onclick = function() { dismiss(false); };
        var confirmBtn = document.createElement('button');
        confirmBtn.type = 'button';
        confirmBtn.className = 'btn btn--primary';
        if (destructive) confirmBtn.style.background = 'var(--red)';
        confirmBtn.textContent = confirmText;
        confirmBtn.onclick = function() {
            dismiss(true);
            try { onConfirm(); } catch(e) { console.error(e); }
        };
        btns.appendChild(cancelBtn);
        btns.appendChild(confirmBtn);
        modal.appendChild(btns);
        overlay.appendChild(modal);
        document.body.appendChild(overlay);
        var focusables = modal.querySelectorAll('button, [href], input, textarea, select');
        function keyHandler(e) {
            if (e.key === 'Escape') { e.preventDefault(); dismiss(false); }
            else if (e.key === 'Enter' && document.activeElement !== cancelBtn) {
                e.preventDefault(); confirmBtn.click();
            } else if (e.key === 'Tab' && focusables.length > 0) {
                var first = focusables[0], last = focusables[focusables.length - 1];
                if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
                else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
            }
        }
        document.addEventListener('keydown', keyHandler);
        confirmBtn.focus();
    }

    // Promise-friendly wrapper for async/await flows.
    function confirmAsync(title, message, confirmText, opts) {
        return new Promise(function(resolve) {
            var o = Object.assign({}, opts || {}, { onDismiss: function() { resolve(false); } });
            showConfirm(title, message, confirmText, function() { resolve(true); }, o);
        });
    }
    </script>

    <script>
    // ===== Theme toggle (works on all pages) =====
    function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const isDark = current === 'dark' || (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const next = isDark ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateThemeIcons();
    }
    function updateThemeIcons() {
        const html = document.documentElement;
        const theme = html.getAttribute('data-theme');
        const isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
        const sunSvg = '<circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.2 4.2l1.4 1.4M14.4 14.4l1.4 1.4M14.4 5.6l1.4-1.4M4.2 15.8l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>';
        const moonSvg = '<path d="M17 10.5A7.5 7.5 0 019.5 3 7 7 0 1017 10.5z" stroke="currentColor" stroke-width="1.5" fill="none"/>';
        document.querySelectorAll('[id^="theme-icon-"]').forEach(svg => {
            svg.innerHTML = isDark ? sunSvg : moonSvg;
        });
    }
    document.addEventListener('DOMContentLoaded', updateThemeIcons);

    // ===== Table sorting =====
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.user-table').forEach(function(table) {
            var headers = table.querySelectorAll('th');
            headers.forEach(function(th, colIdx) {
                if (!th.textContent.trim()) return;
                var arrow = document.createElement('span');
                arrow.className = 'sort-arrow';
                arrow.textContent = ' ▲';
                th.appendChild(arrow);
                th.setAttribute('data-sort-dir', '');
                th.setAttribute('role', 'button');
                th.setAttribute('tabindex', '0');
                th.setAttribute('aria-sort', 'none');
                function doSort() {
                    var dir = th.getAttribute('data-sort-dir') === 'asc' ? 'desc' : 'asc';
                    headers.forEach(function(h) {
                        h.setAttribute('data-sort-dir', '');
                        h.setAttribute('aria-sort', 'none');
                        var a = h.querySelector('.sort-arrow');
                        if (a) { a.textContent = ' ▲'; a.className = 'sort-arrow'; }
                    });
                    th.setAttribute('data-sort-dir', dir);
                    th.setAttribute('aria-sort', dir === 'asc' ? 'ascending' : 'descending');
                    arrow.textContent = dir === 'asc' ? ' ▲' : ' ▼';
                    arrow.className = 'sort-arrow sort-arrow--active';
                    var tbody = table.querySelector('tbody');
                    if (!tbody) return;
                    var rows = Array.from(tbody.querySelectorAll('tr'));
                    rows.sort(function(a, b) {
                        var aCell = a.children[colIdx], bCell = b.children[colIdx];
                        var aText = (aCell ? aCell.textContent : '').trim().toLowerCase();
                        var bText = (bCell ? bCell.textContent : '').trim().toLowerCase();
                        // Prefer ISO-date attr for consistent date sorting across locales
                        var aDateEl = aCell && aCell.querySelector('[data-i18n-date]');
                        var bDateEl = bCell && bCell.querySelector('[data-i18n-date]');
                        if (aDateEl && bDateEl) {
                            var ad = aDateEl.getAttribute('data-i18n-date') || '';
                            var bd = bDateEl.getAttribute('data-i18n-date') || '';
                            return dir === 'asc' ? ad.localeCompare(bd) : bd.localeCompare(ad);
                        }
                        var aNum = parseFloat(aText.replace(/[^0-9.\-]/g, ''));
                        var bNum = parseFloat(bText.replace(/[^0-9.\-]/g, ''));
                        if (!isNaN(aNum) && !isNaN(bNum) && /[0-9]/.test(aText) && /[0-9]/.test(bText)) {
                            return dir === 'asc' ? aNum - bNum : bNum - aNum;
                        }
                        if (aText < bText) return dir === 'asc' ? -1 : 1;
                        if (aText > bText) return dir === 'asc' ? 1 : -1;
                        return 0;
                    });
                    rows.forEach(function(row) { tbody.appendChild(row); });
                }
                th.addEventListener('click', doSort);
                th.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); doSort(); }
                });
            });
        });
    });
    </script>
</body>
</html>
