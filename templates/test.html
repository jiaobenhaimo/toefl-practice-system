{% extends "base.html" %}
{% block title %}{{ test_info.test_name }} — {{ site.name }}{% endblock %}

{% block head %}
{% endblock %}

{% block body %}
<div id="app" class="test-page">

    <!-- LOADING OVERLAY -->
    <div id="screen-loading" class="screen screen--active">
        <div class="loading-msg" data-i18n="loading">Loading test…</div>
    </div>

    <!-- TEST-TAKING SCREEN -->
    <div id="screen-test" class="screen">
        <header class="test-header" role="banner">
            <div class="test-header__left">
                <button class="btn btn--icon" onclick="exitModule()" title="Exit" aria-label="Exit test">
                    <svg width="20" height="20" viewBox="0 0 20 20"><path d="M13 4L7 10l6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
                </button>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode" id="theme-toggle-test">
                    <svg width="20" height="20" viewBox="0 0 20 20" id="theme-icon-test"></svg>
                </button>
            </div>
            <div class="test-header__center">
                <div class="test-header__section" id="section-label"></div>
            </div>
            <div class="test-header__right">
                <div class="timer" id="timer" aria-live="polite">
                    <svg width="18" height="18" viewBox="0 0 18 18"><circle cx="9" cy="9" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/><path d="M9 5v4l3 2" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
                    <span id="timer-display">--:--</span>
                </div>
            </div>
        </header>

        <div class="progress-dots-row" id="progress-row">
            <div class="progress-dots" id="progress-dots" role="group" aria-label="Question progress"></div>
            <span class="progress-counter" id="progress-counter"></span>
        </div>

        <div class="test-body" id="test-body" role="main"></div>

        <footer class="test-footer" role="navigation" aria-label="Question navigation">
            <button class="btn btn--secondary" id="btn-prev" onclick="prevQuestion()" style="display:none" aria-label="Previous question">
                &larr; Previous
            </button>
            <button class="btn btn--icon btn-bookmark" id="btn-bookmark" onclick="toggleBookmark()" style="display:none" title="Bookmark this question" aria-label="Bookmark this question">
                <svg width="20" height="20" viewBox="0 0 20 20" id="bookmark-icon"><path d="M5 3h10v14l-5-3-5 3V3z" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linejoin="round"/></svg>
            </button>
            <button class="btn btn--icon" id="btn-pause" onclick="togglePause()" style="display:none" title="Pause timer" aria-label="Pause timer">
                <svg width="20" height="20" viewBox="0 0 20 20" id="pause-icon"><rect x="5" y="4" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="11.5" y="4" width="3.5" height="12" rx="1" fill="currentColor"/></svg>
            </button>
            <div class="test-footer__spacer"></div>
            <button class="btn btn--primary" id="btn-next" onclick="nextQuestion()" aria-label="Next question">
                Next &rarr;
            </button>
        </footer>
    </div>

    <!-- SECTION TRANSITION SCREEN -->
    <div id="screen-transition" class="screen">
        <div class="transition-card" role="status">
            <div class="transition-card__done" id="transition-done"></div>
            <div class="transition-divider"></div>
            <div class="transition-card__label">Up next</div>
            <div class="transition-card__section" id="transition-section"></div>
            <div class="transition-card__badge" id="transition-badge"></div>
            <button class="btn btn--primary" id="btn-continue" onclick="loadAndStartModule()" aria-label="Continue to next section">Continue</button>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="screen-results" class="screen">
        <header class="screen-header">
            <h1 class="screen-title" id="results-title">Results</h1>
        </header>
        <div class="results-body" id="results-body"></div>
        <div class="results-actions" id="results-actions"></div>
    </div>

</div>

<script>
    const TEST_INFO = {{ test_info|tojson }};
    const URL_PARAMS = Object.fromEntries(new URLSearchParams(window.location.search));
    const CSRF_TOKEN = {{ csrf_token()|tojson }};
    const IS_LOGGED_IN = {{ 'true' if user else 'false' }};
</script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% endblock %}
