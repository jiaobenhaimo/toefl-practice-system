# /etc/nginx/sites-available/toefl
#
# This fronts the Gunicorn Flask app with TLS and reasonable defaults.
# Replace `toefl.example.com` with your actual hostname.
# Get a cert with `sudo certbot --nginx -d toefl.example.com`.

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name toefl.example.com;

    # Let's Encrypt http-01 challenge path must pass through unredirected.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name toefl.example.com;

    # certbot manages these:
    ssl_certificate     /etc/letsencrypt/live/toefl.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toefl.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';

    # Recommended security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Recording uploads — match Flask's MAX_CONTENT_LENGTH (16MB), with room for
    # multipart overhead.
    client_max_body_size 20m;

    # Long-running finalize/PDF endpoints: don't cut the client off at 60s.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # Serve static/ directly (bypass Flask for CSS/JS/audio)
    location /static/ {
        alias /opt/toefl/app/static/;
        access_log off;
        expires 1h;
    }

    # Everything else → gunicorn
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # So the app knows the original Host (for url_for)
        proxy_set_header X-Forwarded-Host $host;
        proxy_redirect off;
    }
}
